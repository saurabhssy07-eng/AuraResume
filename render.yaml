services:
  - type: web
    name: aura-resume
    env: node
    region: oregon
    plan: starter # Starter plan is recommended for Puppeteer (512MB RAM)
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20.x
      # Puppeteer specifically needs this on Render to find the correct cache path
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/puppeteer
      
      # The following must be securely added in the Render Dashboard after deployment:
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
